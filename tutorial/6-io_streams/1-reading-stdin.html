<h1 id="reading-from-standard-input">Reading from Standard Input</h1>
<p>Use <code>std.input(prompt)</code> to read a line of text from the user.</p>
<h2 id="example">Example</h2>
<pre><code class="lang-kelpyshark"><span class="hljs-keyword">line</span> = std.<span class="hljs-keyword">input</span>(<span class="hljs-string">"Type something: "</span>)
<span class="hljs-keyword">print</span> <span class="hljs-string">"You typed: "</span> + <span class="hljs-keyword">line</span>
</code></pre>
<h2 id="summary">Summary</h2>
<ul>
<li><code>std.input</code> reads a line from the user.</li>
</ul>
